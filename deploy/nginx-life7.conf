server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name life7.maxdesign.rs;
    root /var/www/life7/current;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/life7.maxdesign.rs/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/life7.maxdesign.rs/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 35s;
        proxy_send_timeout 35s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
}

server {
    listen 80;
    listen [::]:80;
    server_name life7.maxdesign.rs;
    return 301 https://$host$request_uri;
}
